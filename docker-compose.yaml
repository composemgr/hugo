# nginx proxy address - http://172.17.0.1:60190

name: hugo
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: peaceiris/hugo:latest
    container_name: hugo-app
    restart: always
    pull_policy: always
    command: 'hugo server --bind 0.0.0.0 --port 80 -s /site'
    tty: true
    stdin_open: true
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: hugo-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '172.17.0.1:60190:80'
    volumes:
      - './volumes/data/hugo:/site'
    networks:
      - hugo
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://hugo-app:80'
      - 'cloudflare.hostname=hugo.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.hugo-app.entrypoints=http'
      - 'traefik.http.routers.hugo-app-secure.tls=true'
      - 'traefik.http.routers.hugo-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.hugo-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.hugo-app.middlewares=hugo-app-https-redirect'
      - 'traefik.http.routers.hugo-app-secure.entrypoints=https'
      - 'traefik.http.routers.hugo-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.hugo-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.hugo-app-secure.service=hugo-app'
      - 'traefik.http.services.hugo-app.loadbalancer.server.port=80'

networks:
  hugo:
    name: hugo
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
